<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/customers/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/customers.js"></script>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-dark-custom">
        <a href="#" class="navbar-brand-text">
            <span class="brand-dot"></span>
            Rental Movies
        </a>
        <ul class="navbar-nav-custom">
            <li>
                <a href="/" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-house-door"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/customers" class="nav-link-custom active" onclick="setActive(this)">
                    <i class="bi bi-people"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li>
                <a href="/movies" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-film"></i>
                    <span>Movies</span>
                </a>
            </li>
            <li>
                <a href="/interactions" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-arrow-left-right"></i>
                    <span>Interactions</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <div>
                <div class="page-title">Customers</div>
                <div class="page-subtitle">// MANAGE · BROWSE · ANALYSE</div>
            </div>
            <button class="btn-new" onclick="openNewModal()">
                <i class="bi bi-plus-lg"></i>
                New Customer
            </button>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search by name or country…">
            </div>
            <select class="filter-select" id="genderFilter">
                <option value="">All genders</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <div class="total-badge">Total: <span id="totalCount">—</span></div>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table id="customersTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" id="th-name">
                            Name <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('age')" id="th-age">
                            Age <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('gender')" id="th-gender">
                            Gender <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('country')" id="th-country">
                            Country <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customersBody">
                    <tr class="state-row">
                        <td colspan="5">
                            <div class="spinner-ring"></div><br>Loading customers…
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINATION -->
            <div class="pagination-wrap" id="paginationWrap">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-btns" id="paginationBtns"></div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: VIEW DETAILS
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-person me-2" style="color:var(--accent-blue)"></i>Customer Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 py-3" id="viewModalBody">
                    <!-- filled dynamically -->
                </div>
                <div class="modal-footer gap-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Close</button>
                    <button class="btn-modal-primary" id="viewToEditBtn">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: NEW / EDIT
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle"><i class="bi bi-person-plus me-2" style="color:var(--accent-green)"></i>New Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 py-3">
                    <input type="hidden" id="formCustomerId">
                    <div class="mb-3">
                        <label class="form-label-modal">Name</label>
                        <input type="text" class="form-control-dark" id="formName" placeholder="e.g. Karine Silva">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label-modal">Age</label>
                            <input type="number" class="form-control-dark" id="formAge" min="1" max="120" placeholder="26">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label-modal">Gender</label>
                            <select class="form-select-dark" id="formGender">
                                <option value="">Select…</option>
                                <option value="female">Female</option>
                                <option value="male">Male</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label-modal">Country</label>
                        <input type="text" class="form-control-dark" id="formCountry" placeholder="e.g. Brazil">
                    </div>
                    <div id="formError" style="color:var(--accent-red);font-family:'Space Mono',monospace;font-size:0.75rem;margin-top:10px;display:none;"></div>
                </div>
                <div class="modal-footer gap-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-modal-primary" id="formSubmitBtn" onclick="submitForm()">
                        <i class="bi bi-check-lg me-1"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: CONFIRM DELETE
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body px-4 pt-4 pb-2 text-center">
                    <div class="confirm-icon"><i class="bi bi-trash3"></i></div>
                    <div style="font-weight:800;font-size:1rem;margin-bottom:6px;">Remove Customer?</div>
                    <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text-secondary);">
                        <span id="deleteCustomerName"></span><br>
                        <span style="color:var(--text-muted)">This action cannot be undone.</span>
                    </div>
                    <input type="hidden" id="deleteCustomerId">
                </div>
                <div class="modal-footer justify-content-center gap-2 pt-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-modal-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash3 me-1"></i> Remove
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>
  </body>
</html>
