<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/movies.js"></script>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-dark-custom">
        <a href="#" class="navbar-brand-text">
            <span class="brand-dot"></span>
            Rental Movies
        </a>
        <ul class="navbar-nav-custom">
            <li>
                <a href="/" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-house-door"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/customers" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-people"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li>
                <a href="/movies" class="nav-link-custom active" onclick="setActive(this)">
                    <i class="bi bi-film"></i>
                    <span>Movies</span>
                </a>
            </li>
            <li>
                <a href="/interactions" class="nav-link-custom" onclick="setActive(this)">
                    <i class="bi bi-arrow-left-right"></i>
                    <span>Interactions</span>
                </a>
            </li>
        </ul>
    </nav>

      <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <div>
                <div class="page-title">Movies</div>
                <div class="page-subtitle">// CATALOGUE · MANAGE · BROWSE</div>
            </div>
            <button class="btn-new" onclick="openNewModal()">
                <i class="bi bi-plus-lg"></i>
                New Movie
            </button>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search by title, director, genre…">
            </div>
            <select class="filter-select" id="genreFilter">
                <option value="">All genres</option>
            </select>
            <select class="filter-select" id="languageFilter">
                <option value="">All languages</option>
            </select>
            <select class="filter-select" id="ratingFilter">
                <option value="">Any rating</option>
                <option value="5">★ 5</option>
                <option value="4">★ 4+</option>
                <option value="3">★ 3+</option>
            </select>
            <div class="total-badge">Total: <span id="totalCount">—</span></div>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table id="moviesTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" id="th-name">
                            Title <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('genre')" id="th-genre">
                            Genre <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('releaseDate')" id="th-releaseDate">
                            Release <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('language')" id="th-language">
                            Language <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('durationMinutes')" id="th-durationMinutes">
                            Duration <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('rating')" id="th-rating">
                            Rating <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('price')" id="th-price">
                            Price <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th onclick="sortTable('director')" id="th-director">
                            Director <i class="bi bi-chevron-expand sort-icon"></i>
                        </th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="moviesBody">
                    <tr class="state-row">
                        <td colspan="9">
                            <div class="spinner-ring"></div><br>Loading movies…
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- PAGINATION -->
            <div class="pagination-wrap" id="paginationWrap">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-btns" id="paginationBtns"></div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: VIEW DETAILS
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-film me-2" style="color:var(--accent-blue)"></i>Movie Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 py-3" id="viewModalBody"></div>
                <div class="modal-footer gap-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Close</button>
                    <button class="btn-modal-primary" id="viewToEditBtn">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: NEW / EDIT
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle">
                        <i class="bi bi-plus-circle me-2" style="color:var(--accent-green)"></i>New Movie
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 py-3">
                    <input type="hidden" id="formMovieId">

                    <!-- Row 1: title + director -->
                    <div class="form-row-2 mb-3">
                        <div>
                            <label class="form-label-modal">Title</label>
                            <input type="text" class="form-control-dark" id="formName" placeholder="e.g. Lara Croft">
                        </div>
                        <div>
                            <label class="form-label-modal">Director</label>
                            <input type="text" class="form-control-dark" id="formDirector" placeholder="e.g. Christopher Nolan">
                        </div>
                    </div>

                    <!-- Row 2: genre + language + release -->
                    <div class="form-row-3 mb-3">
                        <div>
                            <label class="form-label-modal">Genre</label>
                            <input type="text" class="form-control-dark" id="formGenre" placeholder="e.g. Adventure">
                        </div>
                        <div>
                            <label class="form-label-modal">Language</label>
                            <input type="text" class="form-control-dark" id="formLanguage" placeholder="e.g. English">
                        </div>
                        <div>
                            <label class="form-label-modal">Release Date</label>
                            <input type="date" class="form-control-dark" id="formReleaseDate">
                        </div>
                    </div>

                    <!-- Row 3: duration + price -->
                    <div class="form-row-2 mb-3">
                        <div>
                            <label class="form-label-modal">Duration (minutes)</label>
                            <input type="number" class="form-control-dark" id="formDuration" min="1" placeholder="e.g. 152">
                        </div>
                        <div>
                            <label class="form-label-modal">Price ($)</label>
                            <input type="number" class="form-control-dark" id="formPrice" min="0" step="0.01" placeholder="e.g. 30.50">
                        </div>
                    </div>

                    <!-- Rating slider -->
                    <div class="mb-3">
                        <label class="form-label-modal">Rating (1 – 5)</label>
                        <div class="rating-slider-wrap">
                            <input type="range" id="formRating" min="1" max="5" step="1" value="3"
                                oninput="document.getElementById('formRatingVal').textContent = this.value">
                            <span class="rating-preview" id="formRatingVal">3</span>
                            <span id="formRatingStars"></span>
                        </div>
                    </div>

                    <!-- Slug -->
                    <div class="mb-2">
                        <label class="form-label-modal">Slug <span style="color:var(--text-muted);font-size:0.65rem;">(auto-generated, editable)</span></label>
                        <input type="text" class="form-control-dark" id="formSlug" placeholder="e.g. lara-croft">
                    </div>

                    <div id="formError" style="color:var(--accent-red);font-family:'Space Mono',monospace;font-size:0.75rem;margin-top:10px;display:none;"></div>
                </div>
                <div class="modal-footer gap-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-modal-primary" id="formSubmitBtn" onclick="submitForm()">
                        <i class="bi bi-check-lg me-1"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL: CONFIRM DELETE
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body px-4 pt-4 pb-2 text-center">
                    <div class="confirm-icon"><i class="bi bi-trash3"></i></div>
                    <div style="font-weight:800;font-size:1rem;margin-bottom:6px;">Remove Movie?</div>
                    <div style="font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text-secondary);">
                        <span id="deleteMovieName"></span><br>
                        <span style="color:var(--text-muted)">This action cannot be undone.</span>
                    </div>
                    <input type="hidden" id="deleteMovieId">
                </div>
                <div class="modal-footer justify-content-center gap-2 pt-2">
                    <button class="btn-modal-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-modal-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash3 me-1"></i> Remove
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>
  </body>
</html>
